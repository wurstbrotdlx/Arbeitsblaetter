<script>
// ============================================================
// Store + Persistence
// ============================================================
const SEED = JSON.parse(document.getElementById('seed').textContent);
const STORAGE_KEY = 'kp2026-v1';
const SCHEMA_VERSION = 1;

const store = {
  state: null,
  subs: new Set(),
  init() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.schemaVersion === SCHEMA_VERSION) {
          this.state = parsed;
          return;
        }
      } catch (e) { console.warn('Seed corrupted, using defaults'); }
    }
    this.state = deepClone(SEED);
  },
  set(mutator, opts = {}) {
    mutator(this.state);
    if (!opts.silent) this.state.lastMutationAt = Date.now();
    this.persist();
    this.notify();
  },
  persistTimer: null,
  persist() {
    clearTimeout(this.persistTimer);
    this.persistTimer = setTimeout(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state)); }
      catch (e) { alert('Speichern fehlgeschlagen: ' + e.message); }
    }, 400);
  },
  notify() { this.subs.forEach(f => f()); },
  sub(f) { this.subs.add(f); return () => this.subs.delete(f); },
  replace(newState) {
    this.state = newState;
    this.state.lastMutationAt = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state));
    this.notify();
  },
};

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

// ============================================================
// DOM helpers
// ============================================================
function el(tag, attrs = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v === null || v === undefined || v === false) continue;
    if (k === 'class') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'checked' || k === 'disabled' || k === 'selected' || k === 'hidden' || k === 'open') {
      if (v) e.setAttribute(k, ''); e[k] = !!v;
    }
    else e.setAttribute(k, v);
  }
  const kids = Array.isArray(children) ? children : [children];
  for (const c of kids) {
    if (c === null || c === undefined || c === false) continue;
    e.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
  }
  return e;
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function fmtDateShort(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString('de-DE', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}
function timeAgo(ts) {
  if (!ts) return 'nie';
  const diff = Date.now() - ts;
  const s = Math.floor(diff / 1000);
  if (s < 60) return 'gerade';
  const m = Math.floor(s / 60);
  if (m < 60) return `vor ${m} Min`;
  const h = Math.floor(m / 60);
  if (h < 48) return `vor ${h} h`;
  const d = Math.floor(h / 24);
  return `vor ${d} Tagen`;
}

// ============================================================
// Domain helpers
// ============================================================
function shiftLabel(shiftId) {
  const state = store.state;
  const sh = state.schichten.find(s => s.id === shiftId);
  if (sh) return `${sh.label} · ${sh.zeit || ''}`.trim().replace(/ · $/, '');
  const parts = shiftId.split('-');
  const code = parts[parts.length - 1];
  const labels = { F: 'Frühstück', M: 'Mittag', A: 'Abend', S: 'Spät', SN: 'Snack', ST: 'Ständerling', AB: 'Abbau', E: 'Einkauf' };
  return labels[code] || shiftId;
}

function availShiftKey(shiftId) {
  const sh = store.state.schichten.find(s => s.id === shiftId);
  if (sh && sh.verfuegbarkeitVon) return sh.verfuegbarkeitVon;
  const parts = shiftId.split('-');
  const day = parts.slice(0, -1).join('-');
  const code = parts[parts.length - 1];
  if (code === 'SN') return `${day}-A`;
  if (code === 'E') return `${day}-M`;
  return shiftId;
}

function teamForShift(shiftId) {
  const key = availShiftKey(shiftId);
  const avail = [], nonAvail = [];
  for (const p of store.state.team) {
    if (p.verfuegbarkeit && p.verfuegbarkeit[key]) avail.push(p);
    else nonAvail.push(p);
  }
  return { avail, nonAvail };
}

function getAssign(shiftId, roleKey) {
  return store.state.dienstplanZuteilungen?.[shiftId]?.[roleKey] || '';
}

function setAssign(shiftId, roleKey, personId) {
  store.set(s => {
    if (!s.dienstplanZuteilungen) s.dienstplanZuteilungen = {};
    if (!s.dienstplanZuteilungen[shiftId]) s.dienstplanZuteilungen[shiftId] = {};
    if (personId) s.dienstplanZuteilungen[shiftId][roleKey] = personId;
    else delete s.dienstplanZuteilungen[shiftId][roleKey];
  });
}

function personName(pid) {
  if (!pid) return '—';
  const p = store.state.team.find(t => t.id === pid);
  return p?.name || '?';
}

function personSelect(shiftId, currentValue, onChange, extraOpts = {}) {
  const { avail, nonAvail } = teamForShift(shiftId);
  const sel = el('select', {
    'aria-label': extraOpts.label || 'Person',
    'data-shift': shiftId,
    onchange: (e) => onChange(e.target.value || null),
  });
  sel.appendChild(el('option', { value: '' }, '—'));
  const availGroup = el('optgroup', { label: 'Verfügbar' });
  for (const p of avail) {
    availGroup.appendChild(el('option', { value: p.id, selected: p.id === currentValue }, p.name));
  }
  sel.appendChild(availGroup);
  if (nonAvail.length > 0) {
    const grp = el('optgroup', { label: '⚠ nicht eingetragen für diese Schicht' });
    for (const p of nonAvail) {
      grp.appendChild(el('option', { value: p.id, selected: p.id === currentValue }, p.name));
    }
    sel.appendChild(grp);
  }
  return sel;
}

function assignmentWarn(shiftId, personId) {
  if (!personId) return false;
  const key = availShiftKey(shiftId);
  const p = store.state.team.find(t => t.id === personId);
  return !!(p && !p.verfuegbarkeit?.[key]);
}

function taskProgress(schichtId) {
  const total = store.state.aufgaben.filter(a => a.schicht === schichtId).length;
  const done = store.state.aufgaben.filter(a => a.schicht === schichtId && a.erledigt).length;
  return { total, done };
}

let activeTab = 'heute';
let heuteTagId = null;
let dpTagId = null;
let aufgTagId = null;

function currentDayFromDate() {
  const today = new Date();
  const state = store.state;
  for (const t of state.tage) {
    const m = t.id.match(/(\d{2})\.(\d{2})\./);
    if (!m) continue;
    if (today.getDate() === parseInt(m[1]) && today.getMonth() + 1 === parseInt(m[2])) return t.id;
  }
  return state.tage[0]?.id;
}

function goto(tab) {
  activeTab = tab;
  document.querySelectorAll('nav.tabbar button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  render();
  window.scrollTo(0, 0);
}

// Header render
// ============================================================
function renderHeader() {
  const state = store.state;
  document.getElementById('header-untertitel').textContent =
    `${state.eckdaten.tnKinder || 0} Kinder · ${state.eckdaten.tnMias || 0} Mias · ${state.eckdaten.tnGesamt || 0} Portionen`;

  const anaphNames = state.allergien.filter(a => a.schweregrad === 'Anaphylaxie-Risiko').map(a => a.name.split(' ')[0]);
  const strikt = state.allergien.filter(a => a.schweregrad === 'schwer' && /Zöliakie|Gluten/i.test(a.allergie)).map(a => a.name.split(' ')[0]);
  const laktParts = state.allergien.filter(a => /Laktose/i.test(a.allergie));
  const banner = document.getElementById('allergie-banner');
  banner.innerHTML = '';
  const parts = [];
  parts.push(el('span', { html: `<b>Küche NUSSFREI</b>` }));
  if (laktParts.length > 0) parts.push(el('span', {}, ' · durchgehend laktosefrei'));
  if (strikt.length > 0) parts.push(el('span', { html: ` · <b>${strikt.join(', ')}: strikt glutenfrei</b> (eigene Bretter/Töpfe)` }));
  if (anaphNames.length > 0) parts.push(el('span', { html: ` · Anaphylaxie: <b>${anaphNames.join(', ')}</b>` }));
  parts.forEach(p => banner.appendChild(p));
  banner.onclick = () => goto('allergien');

  const hint = document.getElementById('backup-hint');
  const unsaved = (state.lastMutationAt || 0) > (state.lastExportAt || 0);
  if (unsaved && state.lastExportAt) {
    hint.hidden = false;
    hint.textContent = `Letztes Backup: ${timeAgo(state.lastExportAt)}`;
    hint.classList.toggle('warn', (Date.now() - (state.lastExportAt || 0)) > 6 * 3600 * 1000);
    hint.onclick = openMenu;
  } else if (!state.lastExportAt) {
    hint.hidden = false;
    hint.textContent = 'noch kein Backup';
    hint.classList.add('warn');
    hint.onclick = openMenu;
  } else {
    hint.hidden = true;
  }
}

// -------- Heute --------
VIEWS.heute = (root, state) => {
  if (!heuteTagId) heuteTagId = currentDayFromDate();
  const tag = state.tage.find(t => t.id === heuteTagId) || state.tage[0];
  if (!tag) { root.appendChild(el('p', {}, 'Keine Tage im Plan.')); return; }

  const idx = state.tage.findIndex(t => t.id === tag.id);
  const nav = el('div', { class: 'heute-nav' });
  nav.appendChild(el('button', { onclick: () => { heuteTagId = state.tage[Math.max(0, idx - 1)].id; render(); }, disabled: idx === 0 }, '‹'));
  nav.appendChild(el('div', { class: 'day' }, [tag.label, el('small', {}, tag.untertitel || '')]));
  nav.appendChild(el('button', { onclick: () => { heuteTagId = state.tage[Math.min(state.tage.length - 1, idx + 1)].id; render(); }, disabled: idx === state.tage.length - 1 }, '›'));
  root.appendChild(nav);

  // Anstehende Schichten
  const schichten = state.schichten.filter(s => s.tag === tag.id);
  if (schichten.length > 0) {
    const card = el('div', { class: 'card' });
    card.appendChild(el('h3', {}, 'Schichten heute'));
    for (const sh of schichten) {
      const zuteilung = state.dienstplanZuteilungen?.[sh.id] || {};
      const namen = sh.rollen.map(r => zuteilung[r.key] ? `${r.label}: ${personName(zuteilung[r.key])}` : `${r.label}: —`);
      const prog = taskProgress(sh.id);
      const box = el('div', { class: 'heute-schicht', style: { padding: '8px 0', borderTop: '1px solid var(--border)' } });
      box.appendChild(el('div', { class: 'zeit' }, `${sh.label}\n${sh.zeit || ''}`));
      const right = el('div');
      right.appendChild(el('div', {}, sh.inhalt || ''));
      right.appendChild(el('div', { class: 'assign' }, namen.length ? namen.join(' · ') : '(keine Rollen)'));
      if (prog.total > 0) {
        const pb = el('div', { class: 'progress-bar', style: { marginTop: '4px', maxWidth: '200px' } });
        pb.appendChild(el('span', { style: { width: `${(prog.done / prog.total) * 100}%` } }));
        right.appendChild(pb);
        right.appendChild(el('div', { class: 'subtle' }, `${prog.done} / ${prog.total} Aufgaben`));
      }
      box.appendChild(right);
      card.appendChild(box);
    }
    root.appendChild(card);
  }

  // Offene Aufgaben
  const offene = state.aufgaben.filter(a => a.tag === tag.id && !a.erledigt);
  const card2 = el('div', { class: 'card' });
  card2.appendChild(el('h3', {}, `Offene Aufgaben (${offene.length})`));
  if (offene.length === 0) {
    card2.appendChild(el('p', { class: 'subtle' }, 'Alles erledigt 🎉'));
  } else {
    for (const a of offene.slice(0, 30)) {
      const row = el('div', { style: { padding: '6px 0', borderTop: '1px solid var(--border)', display: 'flex', gap: '8px' } });
      const cb = el('input', { type: 'checkbox', onchange: () => toggleTask(a.id) });
      row.appendChild(cb);
      const tx = el('div', { style: { flex: '1' } });
      tx.appendChild(el('div', {}, a.aufgabe));
      const wer1 = a.wer1 ? personName(a.wer1) : '?';
      const wer2 = a.wer2 ? personName(a.wer2) : '';
      tx.appendChild(el('div', { class: 'subtle' }, `${shiftLabel(a.schicht)} · ${wer1}${wer2 ? ' · ' + wer2 : ''}`));
      row.appendChild(tx);
      card2.appendChild(row);
    }
    if (offene.length > 30) {
      card2.appendChild(el('p', { class: 'subtle' }, `… und ${offene.length - 30} mehr — siehe Aufgaben-Tab`));
    }
  }
  root.appendChild(card2);
};

    prevDay = sh.tag;

};

function toggleAvail(personId, shiftId) {
  store.set(s => {
    const p = s.team.find(t => t.id === personId);
    if (!p) return;
    if (!p.verfuegbarkeit) p.verfuegbarkeit = {};
    if (p.verfuegbarkeit[shiftId]) delete p.verfuegbarkeit[shiftId];
    else p.verfuegbarkeit[shiftId] = true;
  });
}

// -------- Aufgaben --------
VIEWS.aufgaben = (root, state) => {
  if (!aufgTagId) aufgTagId = currentDayFromDate();
  root.appendChild(tagTabs('aufgaben', () => aufgTagId, (id) => { aufgTagId = id; render(); }));
  const tag = state.tage.find(t => t.id === aufgTagId);
  if (!tag) return;
  root.appendChild(el('h2', { class: 'section-title' }, [tag.label, ' — ', el('span', { class: 'subtle' }, tag.untertitel || '')]));

  // Collect unique shift IDs for this day, from aufgaben
  const shiftIds = [];
  const seen = new Set();
  for (const a of state.aufgaben) {
    if (a.tag !== tag.id) continue;
    if (seen.has(a.schicht)) continue;
    seen.add(a.schicht);
    shiftIds.push(a.schicht);
  }
  // Sort by canonical order F, E, M, SN, A, S, ST, AB
  const order = { F: 1, E: 2, M: 3, SN: 4, A: 5, S: 6, ST: 7, AB: 8 };
  shiftIds.sort((x, y) => (order[x.split('-').pop()] || 99) - (order[y.split('-').pop()] || 99));

  for (const shId of shiftIds) {
    const aufg = state.aufgaben.filter(a => a.schicht === shId);
    const done = aufg.filter(a => a.erledigt).length;
    const totalStr = aufg.length > 0 ? `${done}/${aufg.length}` : '0/0';
    const pct = aufg.length > 0 ? (done / aufg.length) * 100 : 0;

    const det = el('details', { class: 'aufg-schicht', open: true });
    const sum = el('summary');
    sum.appendChild(el('div', { class: 'schicht-title' }, shiftLabel(shId)));
    const progInfo = el('div', { class: 'progress-info' });
    const pb = el('div', { class: 'progress-bar' });
    pb.appendChild(el('span', { style: { width: `${pct}%` } }));
    progInfo.appendChild(pb);
    progInfo.appendChild(el('span', {}, totalStr));
    sum.appendChild(progInfo);
    det.appendChild(sum);

    for (const a of aufg) {
      const row = el('div', { class: `aufg-task ${a.erledigt ? 'done' : ''}` });
      row.appendChild(el('input', { type: 'checkbox', checked: a.erledigt, onchange: () => toggleTask(a.id) }));
      const tx = el('div', { class: 'task-text' });
      tx.appendChild(el('span', {}, a.aufgabe));
      if (a.hinweis) tx.appendChild(el('span', { class: 'hinweis' }, a.hinweis));
      row.appendChild(tx);
      const wers = el('div', { class: 'task-wers' });
      wers.appendChild(personSelect(shId, a.wer1 || '', (val) => setTaskAssign(a.id, 'wer1', val), { label: 'Wer 1' }));
      wers.appendChild(personSelect(shId, a.wer2 || '', (val) => setTaskAssign(a.id, 'wer2', val), { label: 'Wer 2' }));
      const acts = el('div', { class: 'task-actions' });
      if (a.custom) {
        acts.appendChild(el('button', { class: 'tool-btn danger', onclick: () => { if (confirm('Aufgabe löschen?')) deleteTask(a.id); } }, '×'));
      } else {
        acts.appendChild(el('button', { class: 'tool-btn', onclick: () => editTaskInline(a.id) }, '✏'));
      }
      row.appendChild(el('div', { style: { gridColumn: '3', display: 'flex', flexDirection: 'column', gap: '4px' } }, [wers, acts]));
      det.appendChild(row);
    }
    const add = el('div', { class: 'aufg-add' });
    add.appendChild(el('button', { onclick: () => addTask(shId) }, '+ Aufgabe hinzufügen'));
    det.appendChild(add);
    root.appendChild(det);
  }
};

function toggleTask(id) {
  store.set(s => { const a = s.aufgaben.find(x => x.id === id); if (a) a.erledigt = !a.erledigt; });
}
function setTaskAssign(id, key, val) {
  store.set(s => { const a = s.aufgaben.find(x => x.id === id); if (a) a[key] = val; });
}
function addTask(shId) {
  const text = prompt('Aufgabe:');
  if (!text) return;
  const hint = prompt('Hinweis (optional):') || '';
  store.set(s => {
    const parts = shId.split('-');
    const tag = parts.slice(0, -1).join('-');
    s.aufgaben.push({
      id: 'a-custom-' + (crypto.randomUUID?.() || Date.now()),
      tag, schicht: shId,
      aufgabe: text, hinweis: hint,
      wer1: null, wer2: null, erledigt: false, custom: true,
    });
  });
}
function editTaskInline(id) {
  const a = store.state.aufgaben.find(x => x.id === id);
  if (!a) return;
  const text = prompt('Aufgabe:', a.aufgabe);
  if (text === null) return;
  const hint = prompt('Hinweis:', a.hinweis || '');
  if (hint === null) return;
  store.set(s => { const t = s.aufgaben.find(x => x.id === id); if (t) { t.aufgabe = text; t.hinweis = hint; } });
}
function deleteTask(id) {
  store.set(s => { s.aufgaben = s.aufgaben.filter(x => x.id !== id); });
}

// -------- Speiseplan --------
VIEWS.speiseplan = (root, state) => {
  root.appendChild(el('h2', { class: 'section-title' }, 'Speiseplan'));
  const days = {};
  for (const p of state.speiseplan) {
    if (!days[p.tag]) days[p.tag] = { untertitel: p.tagUntertitel, mahlzeiten: [] };
    days[p.tag].mahlzeiten.push(p);
  }
  for (const [tag, info] of Object.entries(days)) {
    const card = el('div', { class: 'sp-tag-card' });
    card.appendChild(el('h3', {}, [tag, info.untertitel ? el('span', { class: 'subtle' }, ' — ' + info.untertitel) : null]));
    for (const m of info.mahlzeiten) {
      const box = el('div', { class: 'sp-mahlzeit' });
      box.appendChild(el('h4', {}, m.mahlzeit));
      box.appendChild(el('div', { class: 'gericht' }, m.gericht));
      if (m.info) {
        box.appendChild(el('details', {}, [
          el('summary', {}, 'Info & Hintergrund'),
          el('div', { class: 'info-body' }, m.info),
        ]));
      }
      if (m.sonderkost) {
        box.appendChild(el('details', {}, [
          el('summary', {}, 'Sonderkost-Abzweig'),
          el('div', { class: 'info-body' }, m.sonderkost),
        ]));
      }
      if (m.zuKlaeren) {
        const zk = el('div', { class: 'sp-zk' + ((state.speiseplanErledigt?.[m.tag + '|' + m.mahlzeit] || false) ? ' done' : '') });
        zk.appendChild(el('input', {
          type: 'checkbox',
          checked: !!(state.speiseplanErledigt?.[m.tag + '|' + m.mahlzeit]),
          onchange: () => toggleSpZk(m.tag, m.mahlzeit),
        }));
        zk.appendChild(el('span', {}, [el('b', {}, 'Zu klären: '), m.zuKlaeren]));
        box.appendChild(zk);
      }
      card.appendChild(box);
    }
    root.appendChild(card);
  }
};
function toggleSpZk(tag, mahlzeit) {
  const key = tag + '|' + mahlzeit;
  store.set(s => {
    if (!s.speiseplanErledigt) s.speiseplanErledigt = {};
    if (s.speiseplanErledigt[key]) delete s.speiseplanErledigt[key];
    else s.speiseplanErledigt[key] = true;
  });
}

// ============================================================
// Common: Tag-Tabs
// ============================================================
function tagTabs(_, getActive, setActive) {
  const wrap = el('div', { class: 'tag-tabs' });
  const state = store.state;
  for (const t of state.tage) {
    const btn = el('button', {
      class: getActive() === t.id ? 'active' : '',
      onclick: () => setActive(t.id),
    }, [t.label.replace(/(\S+)\s(\d+\.\d+)\./, '$1 $2.'), t.untertitel ? el('small', {}, t.untertitel) : null]);
    wrap.appendChild(btn);
  }
  return wrap;
}

// ============================================================
// Person modal
// ============================================================
function openPersonModal(personId) {
  const isEdit = !!personId;
  const p = isEdit ? store.state.team.find(t => t.id === personId) : { name: '', rollen: [], handy: '', allergie: '' };
  if (isEdit && !p) return;
  const ov = el('div', { class: 'overlay', onclick: (e) => { if (e.target === ov) close(); } });
  const modal = el('div', { class: 'modal' });
  modal.appendChild(el('h3', {}, isEdit ? 'Person bearbeiten' : 'Neue Person'));
  const nameI = el('input', { type: 'text', value: p.name, placeholder: 'Name' });
  const rolleI = el('input', { type: 'text', value: (p.rollen || []).join(', '), placeholder: 'z.B. Köchin, Springer' });
  const handyI = el('input', { type: 'tel', value: p.handy, placeholder: '0172…' });
  const allergyI = el('input', { type: 'text', value: p.allergie, placeholder: 'z.B. Laktose' });
  const rows = [
    ['Name', nameI],
    ['Rollen (Komma-getrennt)', rolleI],
    ['Handy', handyI],
    ['Allergie / Unverträglichkeit', allergyI],
  ];
  for (const [lab, inp] of rows) {
    modal.appendChild(el('div', { class: 'row' }, [el('label', {}, lab), inp]));
  }
  const acts = el('div', { class: 'actions' });
  if (isEdit) {
    acts.appendChild(el('button', { class: 'tool-btn danger', onclick: () => {
      if (confirm(`Person ${p.name} wirklich löschen? Zuteilungen bleiben als IDs erhalten.`)) {
        store.set(s => { s.team = s.team.filter(t => t.id !== personId); });
        close();
      }
    } }, 'Löschen'));
  }
  acts.appendChild(el('button', { class: 'tool-btn', onclick: close }, 'Abbrechen'));
  acts.appendChild(el('button', { class: 'tool-btn primary', onclick: () => {
    const name = nameI.value.trim();
    if (!name) { alert('Name erforderlich'); return; }
    const rollen = rolleI.value.split(',').map(s => s.trim()).filter(Boolean);
    store.set(s => {
      if (isEdit) {
        const t = s.team.find(x => x.id === personId);
        t.name = name; t.rollen = rollen; t.handy = handyI.value; t.allergie = allergyI.value;
      } else {
        const id = 'p-' + (crypto.randomUUID?.() || Date.now());
        s.team.push({ id, name, rollen, handy: handyI.value, allergie: allergyI.value, verfuegbarkeit: {} });
      }
    });
    close();
  } }, 'Speichern'));
  modal.appendChild(acts);
  ov.appendChild(modal);
  document.body.appendChild(ov);
  nameI.focus();
  function close() { ov.remove(); }
}

// ============================================================
// Menu / Export / Import / Reset
// ============================================================
function openMenu() {
  const s = store.state;
  const ov = el('div', { class: 'overlay', onclick: (e) => { if (e.target === ov) close(); } });
  const m = el('div', { class: 'modal' });
  m.appendChild(el('h3', {}, 'Menü'));
  m.appendChild(el('p', { class: 'subtle' }, [
    'Letzte Änderung: ' + fmtDate(s.lastMutationAt), el('br', {}),
    'Letztes Backup: ' + fmtDate(s.lastExportAt),
  ]));
  const acts = el('div', { class: 'actions', style: { flexDirection: 'column', alignItems: 'stretch' } });
  acts.appendChild(el('button', { class: 'tool-btn primary', onclick: () => { exportJSON(); close(); } }, '📤 Backup exportieren'));
  acts.appendChild(el('button', { class: 'tool-btn', onclick: () => { close(); openImport(); } }, '📥 Backup importieren'));
  acts.appendChild(el('button', { class: 'tool-btn danger', onclick: () => { close(); doReset(); } }, '↺ Alles zurücksetzen'));
  acts.appendChild(el('button', { class: 'tool-btn', onclick: close }, 'Schließen'));
  m.appendChild(acts);
  ov.appendChild(m);
  document.body.appendChild(ov);
  function close() { ov.remove(); }
}

async function exportJSON() {
  const s = store.state;
  const now = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  const stamp = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
  const filename = `kuechenplan_${stamp}.json`;
  const json = JSON.stringify(s, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const file = new File([blob], filename, { type: 'application/json' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'Küchenplan Backup', text: 'Backup ' + stamp });
      store.set(st => { st.lastExportAt = Date.now(); }, { silent: true });
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
      console.warn('Share fehlgeschlagen, Fallback Download', e);
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  store.set(st => { st.lastExportAt = Date.now(); }, { silent: true });
}

function openImport() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json,application/json';
  inp.onchange = async () => {
    const f = inp.files[0];
    if (!f) return;
    try {
      const txt = await f.text();
      const data = JSON.parse(txt);
      if (data.schemaVersion !== SCHEMA_VERSION) {
        alert(`Falsche Schema-Version (${data.schemaVersion} statt ${SCHEMA_VERSION})`);
        return;
      }
      const required = ['tage', 'schichten', 'team', 'aufgaben', 'allergien', 'speiseplan', 'mengen'];
      for (const k of required) {
        if (!(k in data)) { alert(`Feld fehlt: ${k}`); return; }
      }
      const preview = [
        'Zeitstempel: ' + fmtDate(data.lastMutationAt || 0),
        `${data.team.length} Personen`,
        `${data.aufgaben.length} Aufgaben`,
        `${data.aufgaben.filter(a => a.erledigt).length} erledigt`,
        `${Object.keys(data.dienstplanZuteilungen || {}).length} Schichten mit Zuteilungen`,
        `${data.allergien.length} Allergien`,
      ];
      if (confirm('Import ersetzt den aktuellen Stand komplett!\n\n' + preview.join('\n') + '\n\nFortfahren?')) {
        store.replace(data);
        alert('Import erfolgreich.');
      }
    } catch (e) {
      alert('Import fehlgeschlagen: ' + e.message);
    }
  };
  inp.click();
}

function doReset() {
  if (!confirm('Wirklich ALLE Änderungen verwerfen und auf Ausgangsdaten zurücksetzen?')) return;
  if (!confirm('Ganz sicher? Diese Aktion kann nicht rückgängig gemacht werden. Erst Backup exportieren?')) return;
  store.replace(deepClone(SEED));
}

// ============================================================
// Render loop
// ============================================================
function render() {
  const state = store.state;
  const root = document.getElementById('view-root');
  root.replaceChildren();
  const renderer = VIEWS[activeTab] || VIEWS.heute;
  renderer(root, state);
  renderHeader();
}

// ============================================================
// Init
// ============================================================
store.init();
store.sub(() => render());
document.querySelectorAll('nav.tabbar button').forEach(b => {
  b.addEventListener('click', () => goto(b.dataset.tab));
});
document.getElementById('menu-btn').addEventListener('click', openMenu);
goto('heute');

// PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW register failed', e));
  });
}
